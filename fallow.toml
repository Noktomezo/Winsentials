entry = [
  "src/main.tsx",
  "src-tauri/**/*.rs",
  "vite.config.ts",
  "eslint.config.js",
  "commitlint.config.js",
  "lint-staged.config.js",
]
ignorePatterns = [
  "**/*.d.ts",
  "**/*.generated.*",
  "dist/**",
  "src-tauri/target/**",
]
ignoreDependencies = [
  "@eslint-react/eslint-plugin",
  "@j178/prek",
  "eslint-plugin-format",
  "eslint-plugin-react-hooks",
  "eslint-plugin-react-refresh",
  "eslint-plugin-tailwindcss",
  "shadcn",
]
ignoreExportsUsedInFile = true
production = false
ignoreExports = [
  # Planned usage for upcoming UI features (Shadcn UI standard exports)
  { file = "src/shared/ui/breadcrumb.tsx", exports = [ "Breadcrumb", "BreadcrumbEllipsis", "BreadcrumbItem", "BreadcrumbLink", "BreadcrumbList", "BreadcrumbPage", "BreadcrumbSeparator" ] },
  { file = "src/shared/ui/card.tsx", exports = [ "Card", "CardAction", "CardContent", "CardDescription", "CardFooter", "CardHeader", "CardTitle" ] },
  { file = "src/shared/ui/dialog.tsx", exports = [ "Dialog", "DialogClose", "DialogContent", "DialogDescription", "DialogFooter", "DialogHeader", "DialogPortal", "DialogTitle", "DialogTrigger" ] },
  { file = "src/shared/ui/dropdown-menu.tsx", exports = [ "DropdownMenu", "DropdownMenuCheckboxItem", "DropdownMenuContent", "DropdownMenuItem", "DropdownMenuLabel", "DropdownMenuRadioGroup", "DropdownMenuRadioItem", "DropdownMenuSeparator", "DropdownMenuShortcut", "DropdownMenuSub", "DropdownMenuSubContent", "DropdownMenuSubTrigger", "DropdownMenuTrigger" ] },
  { file = "src/shared/ui/select.tsx", exports = [ "filledSelectTriggerClassName", "Select", "SelectContent", "SelectGroup", "SelectItem", "SelectLabel", "SelectScrollDownButton", "SelectScrollUpButton", "SelectSeparator", "SelectTrigger", "SelectValue" ] },
  { file = "src/shared/ui/sheet.tsx", exports = [ "Sheet", "SheetClose", "SheetContent", "SheetDescription", "SheetFooter", "SheetHeader", "SheetTitle", "SheetTrigger" ] },
  { file = "src/shared/ui/sidebar.tsx", exports = [ "*" ] },
]

[rules]
unused-files = "error"
unused-exports = "warn"
unused-types = "warn"
private-type-leaks = "off"
unused-dependencies = "warn"
unused-dev-dependencies = "warn"
unresolved-imports = "warn"

[duplicates]
enabled = true
mode = "mild"
minTokens = 60
minLines = 8
threshold = 150
ignore = []

[health]
maxCyclomatic = 15
maxCognitive = 20
maxCrap = 30
ignore = [ "**/*.generated.*" ]

[audit]
gate = "new-only"
