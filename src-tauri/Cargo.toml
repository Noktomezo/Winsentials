[package]
name = "winsentials"
version = "0.1.0"
description = "✨ Optimize Windows 10/11 performance, privacy, and appearance with a sleek native desktop app."
authors = ["Noktomezo <noktomezo@duck.com>"]
edition = "2024"
rust-version = "1.88"

[lib]
name = "winsentials_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tokio = { version = "1", features = ["sync", "time"] }
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = "0.38.2"
tauri-plugin-fs = "2"
tauri-plugin-shell = "2"
winreg = "0.55"
gfxinfo = { version = "0.1", features = ["nvidia", "amd", "intel", "gpu_info"] }
wmi = "0.18"
paste = "1"
parking_lot = "0.12"
lnk = "0.5"
base64 = "0.22"
dirs = "5"
windows = { version = "0.58", features = [
  "Win32_Foundation",
  "Win32_UI_Shell",
  "Win32_UI_WindowsAndMessaging",
  "Win32_Storage_FileSystem",
  "Win32_Graphics_Gdi",
  "Win32_System_Environment",
  "Win32_Globalization",
] }
chrono = "0.4"
png = "0.17"
pelite = "0.10"
quick-xml = "0.37"
tauri-plugin-clipboard-manager = "2.3.2"
rayon = "1.10"
