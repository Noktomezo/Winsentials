[package]
name = "winsentials"
version = "0.1.0"
description = "✨ Optimize Windows 10/11 performance, privacy, and appearance with a sleek native desktop app."
authors = ["Noktomezo <noktomezo@duck.com>"]
edition = "2024"

[[bin]]
name = "Winsentials"
path = "src/main.rs"

[profile.release]
overflow-checks = false
codegen-units = 1
opt-level = "z"
panic = "abort"
strip = true
lto = true

[lib]
name = "winsentials_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tokio = { version = "1.49.0", features = ["sync", "time"] }
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sysinfo = "0.38.2"
tauri-plugin-fs = "2"
tauri-plugin-shell = "2"
winreg = "0.55.0"
gfxinfo = { version = "0.1.2", features = ["nvidia", "amd", "intel", "gpu_info"] }
wmi = "0.18.3"
paste = "1.0.15"
parking_lot = "0.12.5"
lnk = "0.6.3"
base64 = "0.22.1"
dirs = "6.0.0"
windows = { version = "0.62.2", features = [
  "Win32_Foundation",
  "Win32_UI_Shell",
  "Win32_UI_WindowsAndMessaging",
  "Win32_Storage_FileSystem",
  "Win32_Graphics_Gdi",
  "Win32_System_Environment",
  "Win32_System_Com",
  "Win32_System_TaskScheduler",
  "Win32_System_Variant",
  "Win32_System_Ole",
  "Win32_System_Services",
  "Win32_Globalization",
] }
chrono = "0.4.44"
png = "0.18.1"
pelite = "0.10.0"
quick-xml = "0.39.2"
tauri-plugin-clipboard-manager = "2.3.2"
rayon = "1.11.0"
dunce = "1.0.5"
