<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React + Typescript</title>
    <script>
      ;(() => {
        const DEFAULT_THEME = 'system'
        const DEFAULT_WEBVIEW_MATERIAL = 'none'
        const STORAGE_KEY = 'winsentials-preferences-bootstrap'

        const root = document.documentElement
        const resolveThemePreference = (value) => {
          if (value === 'light' || value === 'dark') return value
          return window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }

        try {
          const raw = window.localStorage.getItem(STORAGE_KEY)
          const persisted = raw ? JSON.parse(raw) : null
          const state = persisted && typeof persisted === 'object' ? persisted.state : null

          const themePreference = state && typeof state.theme === 'string' ? state.theme : DEFAULT_THEME
          const normalizeWebviewMaterial = (value) => {
            if (value === 'micaAlt') return 'tabbed'
            if (value === 'blur') return 'none'
            return value
          }

          const webviewMaterial =
            state && typeof state.webviewMaterial === 'string'
              ? normalizeWebviewMaterial(state.webviewMaterial)
              : state && typeof state.chromeMaterial === 'string'
                ? normalizeWebviewMaterial(state.chromeMaterial)
                : state && state.chromeAcrylic === true
                  ? 'acrylic'
                  : DEFAULT_WEBVIEW_MATERIAL

          const resolvedTheme = resolveThemePreference(themePreference)

          root.dataset.theme = resolvedTheme
          root.dataset.webviewMaterial = webviewMaterial
          root.style.colorScheme = resolvedTheme
        } catch {
          const resolvedTheme = resolveThemePreference(DEFAULT_THEME)

          root.dataset.theme = resolvedTheme
          root.dataset.webviewMaterial = DEFAULT_WEBVIEW_MATERIAL
          root.style.colorScheme = resolvedTheme
        }
      })()
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
