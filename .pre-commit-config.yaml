fail_fast: true
default_install_hook_types: [pre-commit, commit-msg]
repos:
  # Basic checks (files, YAML, TOML, JSON, etc.)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]

      - id: end-of-file-fixer
        stages: [pre-commit]

      - id: check-yaml
        stages: [pre-commit]

      - id: check-toml
        files: ^src-tauri/
        stages: [pre-commit]

      - id: check-json
        stages: [pre-commit]

  # Typos check
  - repo: https://github.com/crate-ci/typos
    rev: v1.30.2
    hooks:
      - id: typos
        stages: [pre-commit]

  # Rust (src-tauri)
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path=src-tauri/Cargo.toml --
        language: system
        pass_filenames: false
        files: ^src-tauri/
        stages: [pre-commit]

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path=src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        files: ^src-tauri/
        stages: [pre-commit]

  # Frontend (staged files only)
  - repo: local
    hooks:
      - id: lint-staged
        name: lint-staged
        entry: bunx lint-staged --quiet --config lint-staged.config.js
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: commitlint
        name: commitlint
        entry: bunx commitlint --edit
        language: system
        pass_filenames: true
        stages: [commit-msg]
